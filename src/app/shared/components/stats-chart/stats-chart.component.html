<div class="chart-wrap">
  <h3>Task Overview</h3>
  <div class="legend">
    <span class="dot blue"></span> Completed
    <span class="dot light" style="margin-left:12px"></span> Pending
  </div>
  <div class="scroll">
    <svg [attr.width]="svgWidth" [attr.height]="chartHeight + 60" class="chart">
      @for (item of chartData; track item.name; let i = $index) {
        <rect
          [attr.x]="getBarX(i)"
          [attr.y]="getBarY(item.total)"
          [attr.width]="barWidth"
          [attr.height]="getBarHeight(item.total)"
          class="bar-bg" rx="3"
        />
        <rect
          [attr.x]="getBarX(i)"
          [attr.y]="getBarY(item.done)"
          [attr.width]="barWidth"
          [attr.height]="getBarHeight(item.done)"
          class="bar-fill" rx="3"
        />
        <text [attr.x]="getBarX(i) + barWidth / 2" [attr.y]="getBarY(item.total) - 4" class="label" text-anchor="middle">
          {{ item.total }}
        </text>
        <text [attr.x]="getBarX(i) + barWidth / 2" [attr.y]="chartHeight + 38" class="name" text-anchor="middle">
          {{ item.name }}
        </text>
      }
    </svg>
  </div>
</div>
