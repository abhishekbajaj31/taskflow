@if (variant === 'card') {
  <div class="skel-grid">
    @for (i of items; track i) {
      <div class="skel-card">
        <div class="row">
          <div class="skel circle"></div>
          <div class="skel chip"></div>
        </div>
        <div class="skel line w60"></div>
        <div class="skel line w40"></div>
        <div class="skel line w50"></div>
        <div class="skel block"></div>
      </div>
    }
  </div>
}

@if (variant === 'row') {
  <div class="skel-list">
    @for (i of items; track i) {
      <div class="skel-row">
        <div class="skel box"></div>
        <div class="skel line flex1"></div>
        <div class="skel chip"></div>
      </div>
    }
  </div>
}

@if (variant === 'header') {
  <div class="skel-header">
    <div class="skel circle lg"></div>
    <div class="lines">
      <div class="skel line w60"></div>
      <div class="skel line w40"></div>
    </div>
  </div>
}
