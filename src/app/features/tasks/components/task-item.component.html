<div class="task-row" [class.done]="task.completed">
  <div class="check" [class.checked]="task.completed">
    @if (task.completed) { ✓ }
  </div>
  <span class="title">{{ task.title }}</span>
  @if (isNew) {
    <span class="new">new</span>
  }
  <span class="status" [class.completed]="task.completed" [class.pending]="!task.completed">
    {{ task.completed ? 'Completed' : 'Pending' }}
  </span>
</div>
